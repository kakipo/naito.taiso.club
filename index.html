<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内藤体操倶楽部 | Naitō Taisō Club</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo-wrap img {
      width: 100%;
      max-width: 480px;
      height: auto;
      display: block;
    }

    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>

  <main>
    <div class="logo-wrap">
      <img src="images/logo-white.png" alt="内藤体操倶楽部 ロゴ">
    </div>
  </main>

  <footer>
    <p>&copy; 2025 株式会社 内藤体操倶楽部</p>
  </footer>

</body>
</html>
